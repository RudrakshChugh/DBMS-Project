<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SEMS</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
  :root {
    --color-base-text: #0F172A;
    --color-base-bg: #F8FAFC;
    --color-base-surface: #FFFFFF;
    
    --color-accent-blue: #2563EB;
    --color-accent-green: #16A34A;
    
    --color-border-default: #E2E8F0;
    --color-border-emphasis: #CBD5E1;
    
    --color-status-success: #16A34A;
    --color-status-warning: #D97706;
    --color-status-danger: #DC2626;
    --color-status-info: #2563EB;
    
    --color-muted: #64748B;
    
    --radius-sm: 6px;
    --radius-md: 8px;
    --radius-lg: 12px;

    --shadow-card: 0 1px 3px rgba(0,0,0,0.06);
    --shadow-focus: 0 0 0 2px #FFFFFF, 0 0 0 4px #2563EB;
  }

  .dark {
    --color-base-text: #FFFFFF;
    --color-base-bg: #000000;
    --color-base-surface: #0A0A0A;
    
    --color-accent-blue: #10B981; /* Replacing the blue accent entirely with Emerald for dark mode */
    --color-accent-green: #10B981;
    
    --color-border-default: rgba(255, 255, 255, 0.1);
    --color-border-emphasis: rgba(255, 255, 255, 0.2);
    
    --color-muted: #888888;

    /* Crisp borders, deep drop shadows, and an ultra-subtle ambient green glow on cards */
    --shadow-card: 0 0 0 1px rgba(255, 255, 255, 0.08), 0 20px 40px rgba(0, 0, 0, 0.8), 0 0 30px rgba(16, 185, 129, 0.05);
    --shadow-focus: 0 0 0 2px #000000, 0 0 15px rgba(16, 185, 129, 0.8);
  }

  /* Add a massive, soft glowing light source behind the UI */
  .dark body {
    background-color: #000000;
    background-image: 
      radial-gradient(circle at 50% -20%, rgba(16, 185, 129, 0.15) 0%, transparent 60%),
      radial-gradient(circle at 100% 100%, rgba(16, 185, 129, 0.08) 0%, transparent 50%);
    background-attachment: fixed;
  }

  body {
    margin: 0;
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    background-color: var(--color-base-bg);
    color: var(--color-base-text);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    line-height: 1.5;
    font-size: 14px;
  }

  h1, h2, h3, h4, h5, h6 {
    line-height: 1.2;
    margin: 0;
  }

  /* Custom Scrollbar */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #CBD5E1; border-radius: 10px; }
  ::-webkit-scrollbar-thumb:hover { background: #94A3B8; }

  /* Animations */
  .fade-in { animation: fadeIn 0.2s ease-out forwards; }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(4px); }
    to { opacity: 1; transform: translateY(0); }
  }
  
  .slide-up { animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
  @keyframes slideUp {
    from { transform: translateY(100%); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }

  .pulse-dot { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: .5; }
  }

  .skeleton-shimmer {
    background: #f6f7f8;
    background-image: linear-gradient(to right, #f6f7f8 0%, #edeef1 20%, #f6f7f8 40%, #f6f7f8 100%);
    background-repeat: no-repeat;
    background-size: 800px 100%; 
    animation-duration: 1.5s;
    animation-fill-mode: forwards; 
    animation-iteration-count: infinite;
    animation-name: placeholderShimmer;
    animation-timing-function: linear;
  }
  @keyframes placeholderShimmer {
    0% { background-position: -468px 0; }
    100% { background-position: 468px 0; }
  }

  table {
    border-collapse: separate;
    border-spacing: 0;
  }
</style>

<script>
  tailwind.config = {
    darkMode: 'class',
    theme: {
      extend: {
        fontFamily: { sans: ['Inter', 'sans-serif'] },
        colors: {
          base: { text: 'var(--color-base-text)', bg: 'var(--color-base-bg)', surface: 'var(--color-base-surface)' },
          accent: { blue: 'var(--color-accent-blue)', green: 'var(--color-accent-green)' },
          border: { "default": 'var(--color-border-default)', emphasis: 'var(--color-border-emphasis)' },
          status: { success: 'var(--color-status-success)', warning: 'var(--color-status-warning)', danger: 'var(--color-status-danger)', info: 'var(--color-status-info)' },
          muted: 'var(--color-muted)'
        },
        boxShadow: {
          card: 'var(--shadow-card)',
          focus: 'var(--shadow-focus)',
          glow: '0 0 15px rgba(59, 130, 246, 0.5)'
        },
        borderRadius: {
          sm: '6px',
          md: '8px',
          lg: '12px'
        },
        spacing: {
          '1': '4px', '2': '8px', '3': '12px', '4': '16px',
          '6': '24px', '8': '32px', '12': '48px', '16': '64px'
        }
      }
    }
  }
</script>
</head>
<body>
<div id="root"></div>

{% endraw %}

</script>
{% endraw %}

</body>
</html>
